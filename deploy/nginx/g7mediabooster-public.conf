# Install in the nginx http context after replacing the server name and TLS paths.
# The Rust listener remains loopback-only; this vhost exposes no control or metrics route.
limit_req_zone $binary_remote_addr zone=g7mb_public_thumbnail:10m rate=100r/s;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name media.example.com;

    ssl_certificate /etc/letsencrypt/live/media.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.example.com/privkey.pem;

    client_max_body_size 1k;
    server_tokens off;

    location ^~ /media/v1/ {
        if ($request_method != GET) {
            return 405;
        }
        limit_except GET {
            deny all;
        }
        limit_req zone=g7mb_public_thumbnail burst=200 nodelay;

        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_hide_header Server;
    }

    location / {
        return 404;
    }
}
