name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  VIPS_CONCURRENCY: 1

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install native development libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libvips-dev libvips-tools ffmpeg
      - name: Verify pinned toolchain
        run: rustup show active-toolchain && rustc --version && cargo --version
      - name: Install pinned nextest harness
        run: cargo install --locked cargo-nextest --version 0.9.140
      - name: Run full Rust quality gate
        run: cargo xtask ci
      - name: Run nextest and doctests
        run: cargo xtask nextest
      - name: Run API process smoke
        run: cargo xtask api-smoke
      - name: Verify Gnuboard adapter toolchains
        run: php --version && composer --version && node --version && npm --version
      - name: Run Gnuboard 7 adapter gate
        run: cargo xtask g7-adapter
      - name: Run Gnuboard 5 adapter gate
        run: cargo xtask g5-adapter
      - name: Install coverage harness
        run: cargo install --locked cargo-llvm-cov --version 0.8.7
      - name: Enforce control-plane coverage ratchet
        run: cargo xtask coverage

  supply-chain:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install pinned supply-chain tools
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-cyclonedx --version 0.5.9
      - name: Audit advisories, licenses, bans, and sources
        run: cargo xtask supply-chain
      - name: Generate CycloneDX workspace SBOM
        run: cargo xtask sbom

  native-fixtures:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install native runtime
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libvips-dev libvips-tools ffmpeg
      - name: Record exact native dependency inventory
        run: cargo xtask native-inventory
      - name: Execute actual AVIF and MP4 round trips
        run: cargo xtask native-smoke

  storage-conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify Docker runtime
        run: docker version
      - name: Run pinned MinIO S3 protocol conformance
        run: cargo xtask storage-conformance

  full-stack-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install native runtime
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libvips-dev libvips-tools ffmpeg
      - name: Run actual API, MinIO, worker, and sandbox media flow
        run: cargo xtask full-stack-smoke

  gnuboard5-host-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify PHP, Composer, and Docker runtimes
        run: php --version && composer --version && docker version
      - name: Install Gnuboard 5 adapter dependencies
        run: composer install --working-dir=adapters/gnuboard5/jiwonpapa-g7mediabooster --no-interaction --prefer-dist
      - name: Run MySQL and MyISAM host contract
        run: bash scripts/gnuboard5-session-store-smoke.sh
