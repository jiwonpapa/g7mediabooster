[graph]
all-features = true
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]

[advisories]
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
